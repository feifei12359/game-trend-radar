name: Radar Daily

on:
  schedule:
    - cron: "0 22 * * *" # 北京时间早上6点
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Generate keywords
        run: npm run keywords

      - name: Fetch YouTube
        run: npm run fetch:youtube

      - name: Check keywords
        run: npm run check:keywords

      - name: Score games
        run: npm run score:games
